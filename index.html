<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldzoneAI - আধুনিক নিউজ ফিড</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="header-top">
            <div class="menu-icon" onclick="toggleSidebar()">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>
            
            <h1 class="logo" onclick="location.reload()">Worldzone<span>AI</span></h1>
            
            <div class="header-right">
                <div id="dark-mode-toggle" onclick="toggleDarkMode()"><i class="fa fa-moon"></i></div>
                <div class="search-icon" onclick="toggleSearch()"><i class="fa fa-search"></i></div>
            </div>
        </div>
        <div id="search-box" class="search-box" style="display:none;">
            <input type="text" id="search-input" placeholder="খবর খুঁজুন..." onkeyup="searchArticles()">
        </div>
    </header>

    <div id="sidebar" class="sidebar">
        <span class="close-btn" onclick="toggleSidebar()">&times;</span>
        <div class="sidebar-header">
            <h2>Worldzone<span>AI</span></h2>
            <p>আপনার প্রতিদিনের সংবাদের সঙ্গী</p>
        </div>
        <div class="sidebar-content">
            <h3>ক্যাটাগরি</h3>
            <ul>
                <li onclick="filterCategory('All')"><i class="fa fa-house"></i> সব খবর</li>
                <li onclick="filterCategory('সর্বশেষ')"><i class="fa fa-clock"></i> সর্বশেষ</li>
                <li onclick="filterCategory('ট্রেন্ডিং')"><i class="fa fa-fire"></i> ট্রেন্ডিং</li>
                <li onclick="filterCategory('পড়াশোনা')"><i class="fa fa-book"></i> পড়াশোনা</li>
                <li onclick="filterCategory('টেকনোলজি')"><i class="fa fa-laptop-code"></i> টেকনোলজি</li>
                <li onclick="filterCategory('আন্তর্জাতিক')"><i class="fa fa-globe"></i> আন্তর্জাতিক</li>
                <li onclick="filterCategory('স্বাস্থ্য')"><i class="fa fa-heart-pulse"></i> স্বাস্থ্য</li>
                <li onclick="filterCategory('এআই')"><i class="fa fa-robot"></i> এআই</li>
                <li onclick="filterCategory('ইনকাম')"><i class="fa fa-money-bill-trend-up"></i> ইনকাম</li>
                <li onclick="filterCategory('চাকরি')"><i class="fa fa-briefcase"></i> চাকরি</li>
            </ul>
            <hr>
            <div class="contact-link" onclick="alert('ইমেইল: info@worldzoneai.pages.dev')">
                <i class="fa fa-envelope"></i> যোগাযোগ করুন
            </div>
        </div>
    </div>

    <div class="horizontal-line"></div>

    <main class="feed-container">
        <div id="news-container"></div>
    </main>

    <footer class="main-footer">
        <p>&copy; ২০২৬ WorldzoneAI | সর্বস্বত্ব সংরক্ষিত</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
