 <!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldzoneAI - নিউজ পোর্টাল</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="main-header">
        <div class="header-top">
            <div class="menu-icon" onclick="toggleSidebar()"><i class="fa fa-bars"></i></div>
            <h1 class="logo" onclick="location.reload()">Worldzone<span>AI</span></h1>
            <div class="header-right">
                <div onclick="toggleDarkMode()"><i class="fa fa-moon"></i></div>
                <div onclick="toggleSearch()"><i class="fa fa-search"></i></div>
            </div>
        </div>
        <div id="search-box" class="search-box" style="display:none;">
            <input type="text" id="search-input" placeholder="খবর খুঁজুন..." onkeyup="searchArticles()">
        </div>
    </header>

    <div id="sidebar" class="sidebar">
        <span class="close-btn" onclick="toggleSidebar()">&times;</span>
        <div class="sidebar-header"><h2>Worldzone<span>AI</span></h2></div>
        <div class="sidebar-content">
            <ul>
                <li onclick="filterCategory('All')"><i class="fa fa-house"></i> সব খবর</li>
                <li onclick="filterCategory('সর্বশেষ')"><i class="fa fa-clock"></i> সর্বশেষ</li>
                <li onclick="filterCategory('চাকরি')"><i class="fa fa-briefcase"></i> চাকরি</li>
                <li onclick="filterCategory('ইনকাম')"><i class="fa fa-money-bill-trend-up"></i> ইনকাম</li>
                <li onclick="filterCategory('টেকনোলজি')"><i class="fa fa-laptop-code"></i> টেকনোলজি</li>
                <li onclick="filterCategory('যোগাযোগ')"><i class="fa fa-envelope"></i> যোগাযোগ</li>
            </ul>
        </div>
    </div>

    <main class="feed-container">
        <div id="news-container"></div>
    </main>

    <div id="share-modal" class="modal">
        <div class="modal-content">
            <h3>শেয়ার করুন</h3>
            <div id="social-links" class="share-icons"></div>
            <button onclick="closeModal('share-modal')" class="close-btn-pop">বন্ধ করুন</button>
        </div>
    </div>

    <div id="contact-modal" class="modal">
        <div class="modal-content">
            <h3>যোগাযোগ</h3>
            <div style="padding:15px; text-align:left;">
                <p><i class="fa fa-envelope"></i> ইমেইল: info@worldzoneai.com</p>
                <p><i class="fa fa-phone"></i> ফোন: +৮৮০১৭XXXXXXXX</p>
            </div>
            <button onclick="closeModal('contact-modal')" class="close-btn-pop">বন্ধ করুন</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
