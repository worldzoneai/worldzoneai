<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldzoneAI - আধুনিক নিউজ ফিড</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="header-top">
            <div class="menu-icon" onclick="toggleSidebar()">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>
            <h1 class="logo" onclick="location.reload()">Worldzone<span>AI</span></h1>
            <div class="header-right">
                <div id="dark-mode-toggle" onclick="toggleDarkMode()"><i class="fa fa-moon"></i></div>
                <div class="search-icon" onclick="toggleSearch()"><i class="fa fa-search"></i></div>
            </div>
        </div>
        <div id="search-box" class="search-box" style="display:none;">
            <input type="text" id="search-input" placeholder="খবর খুঁজুন..." onkeyup="searchArticles()">
        </div>
    </header>

    <div id="sidebar" class="sidebar">
        <span class="close-btn" onclick="toggleSidebar()">&times;</span>
        <div class="sidebar-header">
            <h2>Worldzone<span>AI</span></h2>
        </div>
        <div class="sidebar-content">
            <h3>ক্যাটাগরি</h3>
            <ul id="category-list">
                <li onclick="filterCategory('All')">সব খবর</li>
                <li onclick="filterCategory('সর্বশেষ')">সর্বশেষ</li>
                <li onclick="filterCategory('ট্রেন্ডিং')">ট্রেন্ডিং</li>
                <li onclick="filterCategory('পড়াশোনা')">পড়াশোনা</li>
                <li onclick="filterCategory('টেকনোলজি')">টেকনোলজি</li>
                <li onclick="filterCategory('আন্তর্জাতিক')">আন্তর্জাতিক</li>
                <li onclick="filterCategory('স্বাস্থ্য')">স্বাস্থ্য</li>
                <li onclick="filterCategory('এআই')">এআই</li>
                <li onclick="filterCategory('ইনকাম')">ইনকাম</li>
                <li onclick="filterCategory('চাকরি')">চাকরি</li>
            </ul>
            <hr>
            <div class="contact-link" onclick="alert('ইমেইল: info@worldzoneai.pages.dev')">
                <i class="fa fa-envelope"></i> যোগাযোগ করুন
            </div>
        </div>
    </div>

    <div class="horizontal-line"></div>
    <main class="feed-container">
        <div id="news-container"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
