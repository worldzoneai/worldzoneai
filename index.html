<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldzoneAI - Global Finance & Make Money Online</title>
    <meta name="description" content="Get the latest insights on Trading, Finance, and Making Money Online globally.">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="header-inner">
            <div class="menu-btn" onclick="toggleMenu()">
                <i class="fa fa-bars"></i>
            </div>
            <div class="logo">Worldzone<span>AI</span></div>
            <div class="header-icons">
                <i class="fa fa-moon" id="theme-toggle" onclick="toggleTheme()"></i>
                <i class="fa fa-search" onclick="toggleSearch()"></i>
            </div>
        </div>
        <div id="search-container" class="search-bar" style="display:none;">
            <input type="text" id="search-input" placeholder="Search articles..." onkeyup="searchPosts()">
        </div>
    </header>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-top">
            <div class="logo">Worldzone<span>AI</span></div>
            <span class="close-sidebar" onclick="toggleMenu()">&times;</span>
        </div>
        <ul class="nav-links">
            <li onclick="filterPosts('All')">Home</li>
            <li onclick="filterPosts('Trading')">Trading</li>
            <li onclick="filterPosts('Finance')">Finance</li>
            <li onclick="filterPosts('Make Money')">Make Money</li>
            <li onclick="showContact()">Contact</li>
        </ul>
    </div>
    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

    <main class="content-feed">
        <div id="articles-wrapper">
            </div>
    </main>

    <footer>
        <p>&copy; 2026 WorldzoneAI Global. All rights reserved.</p>
        <div class="footer-links">
            <span>Privacy Policy</span> | <span>Terms of Service</span>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
